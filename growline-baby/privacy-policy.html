<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Privacy Policy — GrowlineBaby</title>
  <style>
    :root {
      --text: #1a1a1a;
      --muted: #6b7280;
      --accent: #db2777;
      --border: #e5e7eb;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 80px;
      color: var(--text);
      line-height: 1.7;
      background: var(--bg);
    }
    header {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 8px;
    }
    .brand { font-weight: 700; font-size: 1.05rem; color: var(--accent); }
    label { font-size: 0.85rem; color: var(--muted); margin-right: 6px; }
    select {
      font: inherit;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    a { color: var(--accent); }
    h1 { font-size: 1.7rem; margin-top: 0.8em; }
    h2 { font-size: 1.25rem; margin-top: 1.8em; }
    h3 { font-size: 1.05rem; margin-top: 1.4em; }
    hr { border: none; border-top: 1px solid var(--border); margin: 1.8em 0; }
    p, li { margin: 0.6em 0; }
    code { background: #f3f4f6; padding: 2px 5px; border-radius: 5px; }
    footer { margin-top: 48px; color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <span class="brand">GrowlineBaby</span>
    <div>
      <label for="lang">Language</label>
      <select id="lang" aria-label="Language">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="ca">Català</option>
      </select>
    </div>
  </header>

  <main id="content"><p>Loading…</p></main>

  <footer id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const SUPPORTED = ["en", "es", "ca"];
    const FALLBACK = "en";

    function pickLang() {
      const fromQuery = new URLSearchParams(location.search).get("lang");
      if (fromQuery && SUPPORTED.includes(fromQuery.slice(0, 2))) {
        return fromQuery.slice(0, 2);
      }
      const fromBrowser = (navigator.language || "en").slice(0, 2);
      return SUPPORTED.includes(fromBrowser) ? fromBrowser : FALLBACK;
    }

    function load(lang) {
      document.documentElement.lang = lang;
      document.getElementById("lang").value = lang;
      fetch(`privacy-policy.${lang}.md`)
        .then((r) => {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then((md) => {
          document.getElementById("content").innerHTML = marked.parse(md);
        })
        .catch(() => {
          if (lang !== FALLBACK) load(FALLBACK);
          else
            document.getElementById("content").textContent =
              "Could not load the privacy policy.";
        });
    }

    document.getElementById("lang").addEventListener("change", (e) => {
      const lang = e.target.value;
      const url = new URL(location.href);
      url.searchParams.set("lang", lang);
      history.replaceState(null, "", url);
      load(lang);
    });

    load(pickLang());
  </script>
</body>
</html>
