<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — Filmmoji</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px 60px; color: #1a1a1a; line-height: 1.7; }
    a { color: #0070f3; }
    h1, h2, h3 { margin-top: 1.5em; }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 1.5em 0; }
    p { margin: 0.75em 0; }
  </style>
</head>
<body>
  <div id="content"><p>Loading…</p></div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch("privacy-policy.md")
      .then(r => r.text())
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById("content").textContent = "Could not load privacy policy."; });
  </script>
</body>
</html>
